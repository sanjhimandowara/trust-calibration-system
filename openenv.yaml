name: trust-calibration-openenv
version: "1.0.5"
title: Trust Calibration OpenEnv
description: >
  RL environment for dynamic trust weighting across noisy and adversarial signals.

entrypoint:
  module: api.server
  app: app

tasks:
  - id: easy
    description: Low conflict signals
    grader:
      endpoint: /grader?task=easy

  - id: medium
    description: Moderate conflict signals
    grader:
      endpoint: /grader?task=medium

  - id: hard
    description: Adversarial signals
    grader:
      endpoint: /grader?task=hard

observation_space:
  type: vector
  shape: [22]

action_space:
  type: discrete
  n: 6

reward:
  type: float
  range: [-1.0, 1.0]

api:
  health: /health
  tasks: /tasks
  grader: /grader
  reset: /reset
  step: /step
  state: /state
