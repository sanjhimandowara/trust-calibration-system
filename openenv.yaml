name: trust-calibration-openenv
version: "1.0.1"
title: Trust Calibration OpenEnv
description: >
  A reinforcement learning environment where an agent learns how to dynamically
  trust, suppress, and combine multiple noisy and adversarial signals to make
  safe operational decisions: IGNORE, INVESTIGATE, ESCALATE.

entrypoint:
  module: api.server
  app: app

metadata:
  domain: trust-calibration
  category: decision-intelligence
  difficulty_progression: easy-medium-hard

tasks:
  - id: task_easy_stable
    title: Stable Low-Conflict Trust Calibration
    difficulty: easy
    enabled: true
    description: Stable low-conflict signals with minimal ambiguity.
    grader:
      type: python
      module: envs.grader
      function: grade_easy
      score_range:
        min: 0.001
        max: 0.999

  - id: task_medium_conflict
    title: Mixed Conflict Decision-Making
    difficulty: medium
    enabled: true
    description: Mixed conflict with moderate uncertainty.
    grader:
      type: python
      module: envs.grader
      function: grade_medium
      score_range:
        min: 0.001
        max: 0.999

  - id: task_hard_adversarial
    title: Adversarial Signal Suppression
    difficulty: hard
    enabled: true
    description: Adversarial unreliable signals requiring suppression.
    grader:
      type: python
      module: envs.grader
      function: grade_hard
      score_range:
        min: 0.001
        max: 0.999

observation_space:
  type: vector
  shape: [22]

action_space:
  type: discrete
  n: 6

reward:
  type: float
  range: [-1.0, 1.0]

api:
  health: /health
  tasks: /tasks
  reset: /reset
  step: /step
  state: /state
