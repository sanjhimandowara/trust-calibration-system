name: trust-calibration-openenv
version: "1.3.0"

entrypoint:
  module: app
  app: app

tasks:
  - id: easy
    name: Easy Task
    description: Low conflict environment
    grader:
      type: http
      endpoint: /grader/easy
      score_range:
        min: 0.01
        max: 0.99

  - id: medium
    name: Medium Task
    description: Moderate conflict environment
    grader:
      type: http
      endpoint: /grader/medium
      score_range:
        min: 0.01
        max: 0.99

  - id: hard
    name: Hard Task
    description: High conflict adversarial environment
    grader:
      type: http
      endpoint: /grader/hard
      score_range:
        min: 0.01
        max: 0.99

api:
  health: /health
  tasks: /tasks
  grader: /grader
  reset: /reset
  step: /step
  state: /state
