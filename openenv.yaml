name: trust-calibration-openenv
version: "1.1.0"

entrypoint:
  module: api.server
  app: app

tasks:
  - id: easy
    name: Easy Task
    description: Low conflict, stable signals
    grader: /grader/easy

  - id: medium
    name: Medium Task
    description: Moderate conflict and uncertainty
    grader: /grader/medium

  - id: hard
    name: Hard Task
    description: High conflict with adversarial signals
    grader: /grader/hard

api:
  health: /health
  tasks: /tasks
  reset: /reset
  step: /step
  state: /state
